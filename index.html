<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>房贷反推计算器</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="intro-panel" aria-labelledby="page-title">
        <div class="kicker">等额本息</div>
        <h1 id="page-title">房贷反推计算器</h1>
        <p>填三项，留空一项，按等额本息公式自动反推。</p>
        <div class="formula-strip" aria-label="计算公式">
          <span>月供</span>
          <strong>=</strong>
          <span>本金 × 月利率 × (1 + 月利率)<sup>期数</sup> ÷ [(1 + 月利率)<sup>期数</sup> - 1]</span>
        </div>
      </section>

      <section class="workbench" aria-labelledby="calculator-title">
        <div class="workbench-header">
          <div>
            <p class="eyebrow">参数输入</p>
            <h2 id="calculator-title">填写三项</h2>
          </div>
          <div class="tool-actions" aria-label="工具操作">
            <button class="secondary-button" type="button" id="sampleButton">填入示例</button>
            <button class="secondary-button" type="button" id="clearButton">清空</button>
          </div>
        </div>

        <form id="loanForm" novalidate>
          <div class="input-grid">
            <label class="field" data-key="principal" for="principal">
              <span class="field-label">贷款金额</span>
              <span class="field-control">
                <input id="principal" name="principal" inputmode="decimal" autocomplete="off" placeholder="例如 100万">
                <span class="unit">元</span>
              </span>
              <small>支持输入 1000000 或 100万</small>
            </label>

            <label class="field" data-key="annualRate" for="annualRate">
              <span class="field-label">年利率</span>
              <span class="field-control">
                <input id="annualRate" name="annualRate" inputmode="decimal" autocomplete="off" placeholder="例如 4.2">
                <span class="unit">%</span>
              </span>
              <small>按百分数输入，4.2 表示 4.2%</small>
            </label>

            <label class="field" data-key="monthlyPayment" for="monthlyPayment">
              <span class="field-label">月供</span>
              <span class="field-control">
                <input id="monthlyPayment" name="monthlyPayment" inputmode="decimal" autocomplete="off" placeholder="例如 4890">
                <span class="unit">元/月</span>
              </span>
              <small>等额本息下每月固定还款额</small>
            </label>

            <label class="field" data-key="months" for="months">
              <span class="field-label">还款月数</span>
              <span class="field-control">
                <input id="months" name="months" inputmode="decimal" autocomplete="off" placeholder="例如 360">
                <span class="unit">期</span>
              </span>
              <small>支持输入 360 或 30年</small>
            </label>
          </div>

          <div class="form-footer">
            <p id="helperText" class="helper-text" role="status">当前等待输入。</p>
            <button class="primary-button" type="submit">计算缺失项</button>
          </div>
        </form>
      </section>

      <section class="result-panel" aria-labelledby="result-title">
        <div>
          <p class="eyebrow">计算结果</p>
          <h2 id="result-title">结果</h2>
        </div>

        <div class="answer-box">
          <span id="answerLabel">缺失项</span>
          <strong id="answerValue">--</strong>
        </div>

        <div class="metric-grid" aria-label="还款概览">
          <div class="metric">
            <span>总还款</span>
            <strong id="totalPayment">--</strong>
          </div>
          <div class="metric">
            <span>总利息</span>
            <strong id="totalInterest">--</strong>
          </div>
          <div class="metric">
            <span>月利率</span>
            <strong id="monthlyRate">--</strong>
          </div>
        </div>

        <div class="split-bar" aria-hidden="true">
          <span id="principalBar"></span>
          <span id="interestBar"></span>
        </div>

        <p id="resultNote" class="result-note">计算完成后会显示本金与利息占比。</p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
